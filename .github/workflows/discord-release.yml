name: Discord Release Notify

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          WEBHOOK_URL: ${{ secrets.BACKROOMS_DEV_FEED }}
          VERSION: ${{ github.ref_name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Backrooms_${{ github.ref_name }}.mcaddon
        run: |
          payload=$(cat <<EOF
          {
            "username": "Backrooms",
            "avatar_url": "https://raw.githubusercontent.com/Machine-builder/backrooms-addon/refs/heads/main/packs/BP/pack_icon.png",
            "embeds": [
              {
                "title": "Backrooms ${VERSION}",
                "description": "${VERSION} is now available!\n\n[View Release](${RELEASE_URL})\n[Download .mcaddon](${DOWNLOAD_URL})",
                "color": 11637263,
                "url": "${RELEASE_URL}"
              }
            ]
          }
          EOF
          )

          curl \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$payload" \
            "$WEBHOOK_URL"
