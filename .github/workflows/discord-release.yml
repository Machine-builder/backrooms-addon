name: Discord Release Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          WEBHOOK_URL: ${{ secrets.RELEASES_CHANNEL_WEBHOOK }}
          VERSION: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          ASSET_URL: ${{ github.event.release.assets[0].browser_download_url }}
        run: |
          payload=$(cat <<EOF
          {
            "username": "Backrooms",
            "avatar_url": "https://raw.githubusercontent.com/Machine-builder/backrooms-addon/refs/heads/main/packs/BP/pack_icon.png",
            "embeds": [
              {
                "title": "Backrooms ${VERSION}",
                "description": "**${NAME}** is now available!\n\nTo download the .mcaddon or view the changelog, head over to the [Release Page](${RELEASE_URL})\nOr for a direct download, [Click Here](${ASSET_URL})",
                "color": 11637263,
                "url": "${RELEASE_URL}"
              }
            ]
          }
          EOF
          )

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "$payload" \
            "$WEBHOOK_URL"
